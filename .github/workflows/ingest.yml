name: Daily Event Ingestion

on:
  schedule:
    # Every day at 06:00 UTC (11:30 AM IST)
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Ingest MLH hackathons
        continue-on-error: true
        run: node scripts/ingest-mlh.mjs

      - name: Ingest Lu.ma events
        continue-on-error: true
        run: node scripts/ingest-luma.mjs

      - name: Ingest Devfolio hackathons
        continue-on-error: true
        run: node scripts/ingest-devfolio.mjs

      - name: Geocode events missing lat/lng
        continue-on-error: true
        run: node scripts/geocode-events.mjs

      - name: Archive events with dead registration URLs
        continue-on-error: true
        run: node scripts/cleanup-dead.mjs
